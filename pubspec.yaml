name: noorasense
description: "NooraSense - Premium Food Intelligence Demo App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.4

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Theming & Fonts
  flex_color_scheme: ^7.3.1
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  share_plus: ^10.0.0
  vibration: ^2.0.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/images/
